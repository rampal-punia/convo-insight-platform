{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Reset Password - ConvoInsight{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Reset Password</h3>
                {% crispy form %}
                <div class="text-center mt-3">
                    <small>
                        Remember your password? <a href="{% url 'account_login' %}">Login</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
