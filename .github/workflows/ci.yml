# =============================================================================
# ConvoInsight Platform - CI/CD Pipeline
# =============================================================================
name: CI

on:
  push:
    branches: [master, main, develop, development]
  pull_request:
    branches: [master, main, develop, development]

env:
  DJANGO_SETTINGS_MODULE: config.settings.test
  DB_NAME: convoinsight_test
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_HOST: localhost
  DB_PORT: 5432
  OPENAI_API_KEY: sk-test-key-for-ci
  HUGGINGFACEHUB_API_TOKEN: hf-test-token-for-ci
  TAVILY_API_KEY: tvly-test-key-for-ci

jobs:
  # ---- Lint ----
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install ruff

      - name: Run Ruff Linter
        run: cd backend && ruff check .

      - name: Check Formatting
        run: cd backend && ruff format --check .

  # ---- Test ----
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: convoinsight_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-django pytest-asyncio coverage

      - name: Run migrations
        run: cd backend && python manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          cd backend && coverage run -m pytest
          cd backend && coverage report --fail-under=0
          cd backend && coverage xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ---- Build Docker Image ----
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Security Scan ----
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: cd backend && bandit -r apps/ config/ -c pyproject.toml
        continue-on-error: true
